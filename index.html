    <script>
    // ★ここだけ実装（約12行）★
    const KEY='manga-reading-tracker';
    function getEntryData(){{
      const title=document.getElementById('title-input')?.value.trim()||'';
      if(!title){{ alert('タイトルを入力してください'); return null; }}
      const genre=document.getElementById('genre-input')?.value||'マンガ';
      const status=document.getElementById('status-input')?.value||'読了';
      const rating=document.getElementById('rating-input')?.value||'★★★☆☆';
      return {{title,genre,status,rating}};
    }}
    function renderEntry(e){{
      const badgeColor=e.status==='読了'?'#6366F1':e.status==='読書中'?'#f59e0b':'#94a3b8';
      return `<div style="padding:10px;border-bottom:1px solid #f1f5f9;"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><div><span style="font-weight:600;font-size:14px;">${{e.title}}</span><br><span style="font-size:12px;color:#888;">${{e.genre}} · ${{e.rating}}</span></div><div style="display:flex;gap:8px;align-items:center;"><span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${{badgeColor}}22;color:${{badgeColor}};font-weight:600;">${{e.status}}</span><button onclick="del(${{e.id}})" style="color:#ef4444;border:none;background:none;cursor:pointer;font-size:16px;">×</button></div></div><div style="font-size:11px;color:#bbb;margin-top:2px;">${{e.date}}</div></div>`;
    }}
    function getSummary(entries){{
      const done=entries.filter(e=>e.status==='読了').length;
      const genres=[...new Set(entries.map(e=>e.genre))];
      return `<div style="display:flex;gap:16px;flex-wrap:wrap;"><div><span style="font-size:24px;font-weight:700;color:#6366F1;">${{done}}</span><span style="font-size:13px;color:#888;"> 冊読了</span></div><div><span style="font-size:24px;font-weight:700;color:#6366F1;">${{entries.length}}</span><span style="font-size:13px;color:#888;"> 件合計</span></div><div><span style="font-size:24px;font-weight:700;color:#6366F1;">${{genres.length}}</span><span style="font-size:13px;color:#888;"> ジャンル</span></div></div>`;
    }}
    // ★以下変更不要★
    let entries=JSON.parse(localStorage.getItem(KEY)||'[]');
    document.addEventListener('DOMContentLoaded',()=>{{ renderAll(); }});
    function addEntry(){{
      const d=getEntryData(); if(!d) return;
      entries.unshift({{id:Date.now(),date:new Date().toLocaleDateString('ja-JP'),...d}});
      localStorage.setItem(KEY,JSON.stringify(entries));
      renderAll(); document.querySelectorAll('input:not([type=submit])').forEach(i=>i.value='');
      document.getElementById('result').classList.add('show');
    }}
    function del(id){{ entries=entries.filter(e=>e.id!==id); localStorage.setItem(KEY,JSON.stringify(entries)); renderAll(); }}
    function renderAll(){{
      const c=document.getElementById('entries'); const ec=document.getElementById('entry-count');
      if(ec) ec.textContent=entries.length+'件';
      c.innerHTML=entries.length?entries.map(renderEntry).join(''):'<p style="text-align:center;color:#bbb;padding:16px;">まだ記録がありません</p>';
      const s=document.getElementById('summary'); if(s) s.innerHTML=getSummary(entries);
    }}
    </script>
